name: macOS

on:
  push:
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up mise
        uses: jdx/mise-action@v2

      # `mise run test-macos` runs the suite with the Xcode toolchain.
      - name: Test
        run: mise run test-macos
